name: Feature Request
description: Suggest a new feature or improvement for the dashboard.
title: "[Feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Write in English or Chinese.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - UI/UX
        - API proxy
        - auth
        - observability
        - AI chatbot
        - release / CI
        - tests
        - docs
        - other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: Describe the problem before the solution.
      placeholder: What is missing, why the current behavior is insufficient.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed Change
      placeholder: Describe what you want to add or change.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I checked the existing issues for similar requests.
          required: true
