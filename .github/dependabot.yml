version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "deps(ui)"
    groups:
      next-react:
        patterns:
          - "next"
          - "react"
          - "react-dom"
          - "next-auth"
          - "next-intl"
          - "next-themes"
      lint-and-types:
        patterns:
          - "eslint"
          - "eslint-*"
          - "typescript"
          - "@types/*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci"
